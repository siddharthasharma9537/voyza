# .github/workflows/deploy.yml
# CI/CD pipeline: test → build → push to ECR → deploy to EC2

name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:     ap-south-1
  ECR_REPOSITORY: voyza-api
  IMAGE_TAG:      ${{ github.sha }}

jobs:
  # ── Test ─────────────────────────────────────────────────────────────────────
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     test
          POSTGRES_PASSWORD: test
          POSTGRES_DB:       test_db
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 3s

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          SECRET_KEY:           test-secret-key-minimum-32-characters-long
          POSTGRES_SERVER:      localhost
          POSTGRES_USER:        test
          POSTGRES_PASSWORD:    test
          POSTGRES_DB:          test_db
          REDIS_HOST:           localhost
          S3_BUCKET_NAME:       test-bucket
          AWS_ACCESS_KEY_ID:    test
          AWS_SECRET_ACCESS_KEY: test
          RAZORPAY_KEY_ID:      test
          RAZORPAY_KEY_SECRET:  test
          RAZORPAY_WEBHOOK_SECRET: test
        run: |
          cd backend
          pytest tests/unit/ -v --tb=short --cov=app --cov-report=term-missing

      - name: Run integration tests
        env:
          SECRET_KEY:           test-secret-key-minimum-32-characters-long
          POSTGRES_SERVER:      localhost
          POSTGRES_USER:        test
          POSTGRES_PASSWORD:    test
          POSTGRES_DB:          test_db
          REDIS_HOST:           localhost
          S3_BUCKET_NAME:       test-bucket
          AWS_ACCESS_KEY_ID:    test
          AWS_SECRET_ACCESS_KEY: test
          RAZORPAY_KEY_ID:      test
          RAZORPAY_KEY_SECRET:  test
          RAZORPAY_WEBHOOK_SECRET: test
        run: |
          cd backend
          pytest tests/integration/ -v --tb=short

      - name: Lint with ruff
        run: |
          cd backend
          ruff check app/ --select=E,F,W --ignore=E501

  # ── Build & Push ──────────────────────────────────────────────────────────────
  build:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  # ── Deploy ────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/voyza

            # Pull latest compose file
            git pull origin main

            # Login to ECR
            aws ecr get-login-password --region ap-south-1 | \
              docker login --username AWS --password-stdin \
              ${{ secrets.ECR_REGISTRY }}

            # Pull new image
            docker pull ${{ secrets.ECR_REGISTRY }}/voyza-api:latest

            # Run migrations before bringing up new containers
            docker compose -f docker-compose.prod.yml run --rm api \
              alembic upgrade head

            # Rolling update — zero downtime
            docker compose -f docker-compose.prod.yml up -d \
              --no-deps --scale api=2 api celery_worker

            # Health check
            sleep 15
            curl -f https://api.voyza.app/health || exit 1

            # Clean up old images
            docker image prune -f

            echo "Deployment complete: ${{ github.sha }}"
