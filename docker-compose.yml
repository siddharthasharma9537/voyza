services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: voyza
      POSTGRES_PASSWORD: voyza_dev_pass
      POSTGRES_DB: voyza_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voyza -d voyza_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_SERVER=db
      - DATABASE_URL=postgresql+asyncpg://voyza:voyza_dev_pass@db:5432/voyza_db
      - REDIS_HOST=redis
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app      # hot-reload in dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  web:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend-web:/app    # hot-reload in dev
      - /app/node_modules      # preserve node_modules
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000/api/v1

volumes:
  postgres_data:
  redis_data:
