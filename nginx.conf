# /etc/nginx/sites-available/voyza
# Production Nginx configuration for Voyza API
# SSL terminated at Nginx — backend runs plain HTTP internally

upstream api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.voyza.app;
    return 301 https://$host$request_uri;
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.voyza.app;

    # ── SSL (Let's Encrypt via certbot) ───────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.voyza.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.voyza.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Request limits ────────────────────────────────────────────────────────
    client_max_body_size 15M;     # allow car image uploads (max 10MB + overhead)
    client_body_timeout  30s;
    send_timeout         30s;

    # ── Rate limiting (Nginx-level, before FastAPI's slowapi) ─────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;  # stricter for auth

    # ── WebSocket routes ──────────────────────────────────────────────────────
    # Must come BEFORE the general / block (more specific match wins)
    location /ws/ {
        proxy_pass          http://api;
        proxy_http_version  1.1;

        # Required for WebSocket upgrade
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket keep-alive (GPS tracking connections are long-lived)
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;

        # No buffering for real-time data
        proxy_buffering off;
    }

    # ── Auth endpoints (stricter rate limit) ──────────────────────────────────
    location /api/v1/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Webhook endpoint (NO rate limit — Razorpay must always reach it) ──────
    location /api/v1/payments/webhook {
        proxy_pass          http://api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Read raw body for signature verification — no buffering
        proxy_request_buffering off;
    }

    # ── General API ────────────────────────────────────────────────────────────
    location / {
        limit_req zone=api burst=20 nodelay;

        proxy_pass          http://api;
        proxy_http_version  1.1;
        proxy_set_header Connection        "";   # keep-alive to upstream
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Gzip for JSON responses
        gzip on;
        gzip_types application/json text/plain;
        gzip_min_length 256;
    }

    # ── Health check (no auth, no rate limit — for load balancer) ─────────────
    location /health {
        proxy_pass http://api/health;
        access_log off;
    }

    # Block hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }
}
