version: '3.8'

# ── Production Docker Compose ──────────────────────────────────────────────────
# Usage: docker-compose -f docker-compose.prod.yml up -d
# Ensure .env file contains all required variables

services:

  # ── PostgreSQL Database ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: voyza-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-voyza}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-voyza_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - voyza-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-voyza}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G

  # ── MinIO Object Storage ────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: voyza-minio-prod
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_CONSOLE_ADDRESS: ":9001"
      MINIO_DOMAIN: ${MINIO_DOMAIN:-minio.voyzacar.online}
    volumes:
      - minio_data:/data
    networks:
      - voyza-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    expose:
      - "9000"
      - "9001"
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Redis Cache ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: voyza-redis-prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - voyza-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "6379"
    deploy:
      resources:
        limits:
          memory: 512M

  # ── FastAPI Backend (with Gunicorn) ────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voyza-api-prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-voyza}:${DB_PASSWORD}@db:5432/${DB_NAME:-voyza_db}

      # MinIO/S3
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-voyza-documents}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT:-http://minio:9000}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # Security
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-https://voyzacar.online,https://www.voyzacar.online,https://api.voyzacar.online}
    volumes:
      - ./backend:/app
    networks:
      - voyza-network
    expose:
      - "8000"
    command: >
      sh -c "
        alembic upgrade head &&
        gunicorn app.main:app
          --workers 4
          --worker-class uvicorn.workers.UvicornWorker
          --bind 0.0.0.0:8000
          --timeout 120
          --access-logfile -
          --error-logfile -
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  web:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.voyzacar.online/api/v1}
    container_name: voyza-web-prod
    restart: always
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.voyzacar.online/api/v1}
      NODE_ENV: production
    networks:
      - voyza-network
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Nginx Reverse Proxy & SSL ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: voyza-nginx-prod
    restart: always
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - voyza-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  minio_data:
  redis_data:
  nginx_cache:

networks:
  voyza-network:
    driver: bridge
