version: "3.9"

# ── Production docker-compose ─────────────────────────────────────────────────
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
#
# Required env vars (set in .env or secrets manager):
#   POSTGRES_PASSWORD, SECRET_KEY, RAZORPAY_KEY_ID, RAZORPAY_KEY_SECRET,
#   RAZORPAY_WEBHOOK_SECRET, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
#   TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, REDIS_PASSWORD

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER:     voyza
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       voyza_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voyza"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── FastAPI (multiple replicas for HA) ────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --workers 4
        --loop uvloop
        --http httptools
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file: ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: >
      celery -A app.tasks.celery_app worker
        --loglevel=info
        --concurrency=4
        --queues=default,notifications,maintenance
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Celery Beat (scheduler) ───────────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file: ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info --scheduler=redbeat.RedBeatScheduler
    deploy:
      replicas: 1   # MUST be exactly 1 — multiple beat schedulers = duplicate tasks

  # ── Flower (Celery monitoring — internal only) ────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file: ./backend/.env
    command: celery -A app.tasks.celery_app flower --port=5555 --basic_auth=admin:${FLOWER_PASSWORD}
    ports:
      - "127.0.0.1:5555:5555"   # bind to localhost only — expose via Nginx with auth

  # ── Nginx ─────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/sites-available/voyza:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/log/nginx:/var/log/nginx
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    driver: bridge
